# Builds and deploys the Astro Starlight site at site/ to GitHub Pages.
#
# Trigger conditions:
#   - push to main that touches site/, assets/brand/, or this workflow
#   - manual run via workflow_dispatch
#
# Notes:
#   - Custom domain (docs.rettx.eu) is wired via site/public/CNAME, which
#     is copied verbatim into the build output. Make sure the same value
#     is set in repo Settings -> Pages -> Custom domain.
#   - The build pulls Node 22 (Astro 6 requires >= 22.12) and uses
#     `npm ci` with cache for reproducible installs.

name: Docs site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'assets/brand/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs in favour
# of the latest. Don't cancel an in-progress deploy.
concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
