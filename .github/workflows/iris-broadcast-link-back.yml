name: Iris — broadcast README link-back

# One-shot housekeeping: opens a PR on each ecosystem repo that adds a
# short link-back to the rettX program (this repo) at the top of its
# README. Idempotent — skips any repo whose README already carries the
# link-back marker, so the workflow can be re-run safely.
#
# Authored by rettx-iris[bot] using the Iris App token (Contents R/W,
# Pull requests R/W on the listed repos). Trigger manually from the
# Actions tab.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build the patched README locally but do not push or open a PR'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  broadcast:
    name: ${{ matrix.target.repo }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { repo: rettxweb,      kind: app }
          - { repo: rettxadmin,    kind: app }
          - { repo: rettxapi,      kind: app }
          - { repo: rettxmutation, kind: lib, role: 'HGVS mutation parsing & normalisation' }
          - { repo: rettxid,       kind: lib, role: 'pseudonymous patient identifier' }
    steps:
      - name: Mint Iris token (target repo)
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.IRIS_APP_ID }}
          private-key: ${{ secrets.IRIS_PRIVATE_KEY }}
          owner: rett-europe
          repositories: ${{ matrix.target.repo }}

      - name: Check out target repo
        uses: actions/checkout@v4
        with:
          repository: rett-europe/${{ matrix.target.repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: target
          fetch-depth: 1

      - name: Build link-back block
        env:
          KIND: ${{ matrix.target.kind }}
          ROLE: ${{ matrix.target.role }}
        run: |
          set -euo pipefail
          if [[ "$KIND" == "app" ]]; then
            cat > /tmp/block.md <<'EOF'
          <!-- rettx-program-link-back -->
          > **Part of the [rettX program](https://github.com/rett-europe/rettx)** — the patient registry initiative of [Rett Syndrome Europe](https://www.rettsyndrome.eu).
          > Architecture, governance, and the program [constitution](https://github.com/rett-europe/rettx/blob/main/.specify/memory/constitution.md) are public at **[docs.rettx.eu](https://docs.rettx.eu)**.
          > Cross-cutting work starts as a spec on the rettx repo and is fanned out here as `squad`-labeled issues by Iris.
          <!-- /rettx-program-link-back -->

          EOF
          else
            cat > /tmp/block.md <<EOF
          <!-- rettx-program-link-back -->
          > Maintained as part of the **[rettX program](https://github.com/rett-europe/rettx)** — the patient registry initiative of [Rett Syndrome Europe](https://www.rettsyndrome.eu).
          > The library is general-purpose and can be used standalone. It is also the canonical ${ROLE} component used by \`rettxapi\`.
          <!-- /rettx-program-link-back -->

          EOF
          fi
          echo "--- block ---"
          cat /tmp/block.md

      - name: Patch README (idempotent)
        id: patch
        working-directory: target
        run: |
          set -euo pipefail

          if [[ ! -f README.md ]]; then
            echo "::error::README.md not found in ${{ matrix.target.repo }}"
            exit 1
          fi

          if grep -q '<!-- rettx-program-link-back -->' README.md; then
            echo "Already has link-back; nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Prepend the block, preserving the rest of the README verbatim.
          cat /tmp/block.md README.md > README.new
          mv README.new README.md

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "--- diff (first 60 lines) ---"
          git --no-pager diff README.md | head -60 || true

      - name: Commit, push branch, open PR
        if: steps.patch.outputs.changed == 'true' && inputs.dry_run == false
        working-directory: target
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          BRANCH=chore/program-link-back
          git config user.name  "rettx-iris[bot]"
          git config user.email "223556219+Copilot@users.noreply.github.com"

          # If the branch already exists upstream, delete the local checkout
          # and retarget so we always have a fresh PR-ready branch.
          git checkout -b "$BRANCH"
          git add README.md
          git commit -m "chore: add rettX program link-back to README" \
                     -m "Generated by the Iris broadcast workflow on rett-europe/rettx." \
                     -m "" \
                     -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push --force-with-lease origin "$BRANCH"

          # Reuse an existing open PR if one is already there.
          existing=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || true)
          if [[ -n "$existing" ]]; then
            echo "PR already open: #$existing"
            exit 0
          fi

          gh pr create \
            --title "chore: add rettX program link-back to README" \
            --body  "Adds a short header pointing back to the [rettX program](https://github.com/rett-europe/rettx) control plane and constitution.

          Part of normalising every repo in the program to point at the constitution as a single source of truth for cross-cutting rules.

          ---

          Generated by the [Iris broadcast workflow](https://github.com/rett-europe/rettx/actions/workflows/iris-broadcast-link-back.yml) on \`rett-europe/rettx\`. Idempotent — re-runs are no-ops once merged." \
            --head "$BRANCH" \
            --base main
